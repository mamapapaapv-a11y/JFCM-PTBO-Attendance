const fmtDate = d => {
  const [y,m,day] = d.split("-").map(Number);
  return new Date(y, m-1, day).toLocaleDateString("en-US",{weekday:"short",year:"numeric",month:"short",day:"numeric"});
};
const todayStr = () => {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,"0");
  const day = String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${day}`;
};

// ── Export helpers ────────────────────────────────────────────────────────────
function doCSV(records, members) {
  const rows = [["Date","Service","Member Name","Role","Status","Visitor Names"]];
  records.forEach(r => {
    const vStr = (r.visitors||[]).map(v=>v.name).join("; ");
    members.forEach(m => {
      rows.push([r.date, r.service, m.name, m.role,
        (r.presentIds||[]).includes(m.id)?"Present":"Absent", vStr]);
    });
  });
  const csv = rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
  a.download = "jfcm_attendance.csv"; a.click();
}

function doXLSX(records, members) {
  const wb = XLSX.utils.book_new();
  const d1 = [["Date","Service","Member Name","Role","Status","Visitor Count","Visitor Names"]];
  records.forEach(r => {
    const vStr = (r.visitors||[]).map(v=>v.name).join(", ");
    members.forEach(m => d1.push([r.date,r.service,m.name,m.role,
      (r.presentIds||[]).includes(m.id)?"Present":"Absent",(r.visitors||[]).length,vStr]));
  });
  const ws1 = XLSX.utils.aoa_to_sheet(d1);
  ws1["!cols"]=[{wch:12},{wch:30},{wch:22},{wch:10},{wch:10},{wch:14},{wch:40}];
  XLSX.utils.book_append_sheet(wb,ws1,"Attendance Detail");
  const d2=[["Date","Service","Members Present","Visitors","Total"]];
  records.forEach(r=>d2.push([r.date,r.service,(r.presentIds||[]).length,(r.visitors||[]).length,r.total]));
  const ws2=XLSX.utils.aoa_to_sheet(d2);
  ws2["!cols"]=[{wch:12},{wch:30},{wch:18},{wch:10},{wch:8}];
  XLSX.utils.book_append_sheet(wb,ws2,"Summary");
  const d3=[["Name","Role"]];
  members.forEach(m=>d3.push([m.name,m.role]));
  const ws3=XLSX.utils.aoa_to_sheet(d3);
  ws3["!cols"]=[{wch:25},{wch:12}];
  XLSX.utils.book_append_sheet(wb,ws3,"Members");
  XLSX.writeFile(wb,"jfcm_attendance.xlsx");
}

  const [view,     setView]     = useState("take");
  const [date,     setDate]     = useState(todayStr());
  const [service,  setService]  = useState(SERVICES[0]);
  const [att,      setAtt]      = useState({});
  const [newM,     setNewM]     = useState({name:"",role:"Member"});
  const [search,   setSearch]   = useState("");
  const [saving,   setSaving]   = useState(false);
  const [saved,    setSaved]    = useState(false);
  const [visitors, setVisitors] = useState([{name:""}]);
  const [expOpen,  setExpOpen]  = useState(false);
  const [loading,  setLoading]  = useState(true);
  const [dbError,  setDbError]  = useState(null);

  // ── Real-time listeners ──────────────────────────────────────────────────
  useEffect(() => {
    const unsubMembers = db.collection("members")
      .orderBy("createdAt","asc")
      .onSnapshot(snap => {
        setMembers(snap.docs.map(d=>({...d.data(), id:d.id})));
        setLoading(false);
      }, err => { setDbError(err.message); setLoading(false); });

    const unsubRecords = db.collection("attendance")
      .orderBy("createdAt","desc")
      .onSnapshot(snap => {
        setRecords(snap.docs.map(d=>({...d.data(), firestoreId:d.id})));
      }, err => setDbError(err.message));

    return () => { unsubMembers(); unsubRecords(); };
  }, []);

  const toggle = id => { setAtt(p=>({...p,[id]:!p[id]})); setSaved(false); };

  const filtered = members.filter(m=>m.name.toLowerCase().includes(search.toLowerCase()));

  // ── Save attendance to Firestore ──────────────────────────────────────────
  const saveAtt = async () => {
    setSaving(true);
    const pIds = Object.entries(att).filter(([,v])=>v).map(([k])=>k); // string ids
    const vList = visitors.filter(v=>v.name.trim());
    try {
      await db.collection("attendance").add({
        date, service,
        presentIds: pIds,
        visitors: vList,
        total: pIds.length + vList.length,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      setSaved(true);
      setVisitors([{name:""}]);
      setAtt({});
    } catch(e) { alert("Error saving: " + e.message); }
    setSaving(false);
  };

  // ── Add member to Firestore ───────────────────────────────────────────────
  const addMember = async () => {
    if (!newM.name.trim()) return;
    try {
      await db.collection("members").add({
        name: newM.name.trim(),
        role: newM.role,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      setNewM({name:"",role:"Member"});
    } catch(e) { alert("Error adding member: " + e.message); }
  };

  // ── Delete member ─────────────────────────────────────────────────────────
  const delMember = async (id) => {
    if (!confirm("Remove this member from the system?")) return;
    try { await db.collection("members").doc(id).delete(); }
    catch(e) { alert("Error removing: " + e.message); }
  };

  const pCount = Object.values(att).filter(Boolean).length;
  const vCount = visitors.filter(v=>v.name.trim()).length;
  const totalSvc = records.length;
  const avgAtt = totalSvc ? Math.round(records.reduce((s,r)=>s+r.total,0)/totalSvc) : 0;
  const best = totalSvc ? records.reduce((a,b)=>a.total>b.total?a:b) : null;

  // ── Inline styles ─────────────────────────────────────────────────────────
  const card={background:G.card,border:`1px solid ${G.border}`,borderRadius:12,padding:20,marginBottom:16,backdropFilter:"blur(6px)"};
  const secT={fontSize:12,letterSpacing:3,color:G.accent,textTransform:"uppercase",marginBottom:14,paddingBottom:8,borderBottom:`1px solid rgba(80,150,80,0.2)`};
  const inp={padding:"10px 14px",background:"rgba(255,255,255,0.05)",border:`1px solid rgba(80,150,80,0.3)`,borderRadius:8,color:G.text,fontSize:13,outline:"none",width:"100%"};
  const sel={padding:"10px 14px",background:"#0a160a",border:`1px solid rgba(80,150,80,0.3)`,borderRadius:8,color:G.text,fontSize:13,outline:"none",width:"100%"};
  const mRow=p=>({display:"flex",alignItems:"center",gap:12,padding:"11px 14px",borderRadius:8,marginBottom:7,
    background:p?"rgba(92,184,92,0.11)":"rgba(255,255,255,0.03)",
    border:p?`1px solid rgba(92,184,92,0.45)`:`1px solid rgba(255,255,255,0.05)`,cursor:"pointer"});
  const chk=c=>({width:22,height:22,borderRadius:5,border:c?`2px solid ${G.accent}`:`2px solid #3a5a3a`,
    background:c?G.accent:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0});
  const badge=role=>{
    const m={Pastor:["rgba(160,50,50,0.35)","#f08080"],Elder:["rgba(50,90,180,0.35)","#80b0f0"],
      Deacon:["rgba(160,140,40,0.35)","#d4c060"],Youth:["rgba(140,50,180,0.35)","#c080f0"],
      Member:["rgba(60,110,60,0.3)","#90c890"]};
    const[bg,col]=m[role]||m.Member;
    return{fontSize:10,letterSpacing:1,padding:"2px 8px",borderRadius:10,background:bg,color:col,border:"1px solid currentColor"};
  };
  const pBtn={padding:"10px 22px",borderRadius:8,border:"none",background:"linear-gradient(135deg,#3a7a3a,#5cb85c)",color:"#061006",cursor:"pointer",fontSize:13,fontWeight:"bold",letterSpacing:1};
  const gBtn={padding:"10px 20px",borderRadius:8,border:`1px solid rgba(200,168,75,0.5)`,background:"rgba(200,168,75,0.1)",color:G.gold,cursor:"pointer",fontSize:13};
  const sBtn={padding:"10px 16px",borderRadius:8,border:`1px solid rgba(80,150,80,0.2)`,background:"rgba(255,255,255,0.04)",color:G.text,cursor:"pointer",fontSize:13};
  const dBtn={padding:"5px 11px",borderRadius:6,border:"1px solid rgba(200,60,60,0.3)",background:"rgba(200,60,60,0.1)",color:"#f08080",cursor:"pointer",fontSize:11};
  const navBtn=a=>({padding:"8px 16px",borderRadius:6,border:a?`1px solid ${G.accent}`:`1px solid rgba(80,150,80,0.2)`,
    background:a?"rgba(92,184,92,0.14)":"transparent",color:a?G.accentLt:G.muted,cursor:"pointer",fontSize:13,letterSpacing:0.8});

  // ── DB error banner ───────────────────────────────────────────────────────
  if (dbError) return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh",padding:24,textAlign:"center"}}>
      <div style={{fontSize:40,marginBottom:12}}>⚠️</div>
      <div style={{color:"#f08080",fontSize:16,marginBottom:8}}>Firebase connection error</div>
      <div style={{color:G.muted,fontSize:13,maxWidth:400}}>{dbError}</div>
      <div style={{color:G.muted,fontSize:12,marginTop:16}}>Check that Firestore rules allow read/write and your internet connection is active.</div>
    </div>
  );

  // ── Loading screen ────────────────────────────────────────────────────────
  if (loading) return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh",gap:16}}>
      <div style={{width:56,height:56,borderRadius:"50%",border:`2px solid ${G.accent}`,overflow:"hidden",boxShadow:`0 0 20px rgba(92,184,92,0.4)`}}>
        <img src={`data:image/jpeg;base64,${LOGO}`} style={{width:"100%",height:"100%",objectFit:"cover"}} />
      </div>
      <div style={{color:G.accentLt,fontSize:16,letterSpacing:2}}>JFCM</div>
      <div style={{color:G.muted,fontSize:12,letterSpacing:1}}>Connecting to database… <span className="spin">⟳</span></div>
    </div>
  );

  return (
    <div style={{minHeight:"100vh",background:`linear-gradient(155deg,${G.dark} 0%,${G.mid} 55%,#0a1a0a 100%)`}}
         onClick={()=>expOpen&&setExpOpen(false)}>

      {/* ── HEADER ── */}
      <div style={{background:"rgba(0,0,0,0.4)",borderBottom:`1px solid ${G.border}`,padding:"0 20px",display:"flex",alignItems:"center",gap:14,height:72}}>
        <div style={{width:54,height:54,borderRadius:"50%",border:`2px solid ${G.accent}`,overflow:"hidden",flexShrink:0,boxShadow:`0 0 16px rgba(92,184,92,0.4)`}}>
          <img src={`data:image/jpeg;base64,${LOGO}`} alt="JFCM Logo" style={{width:"100%",height:"100%",objectFit:"cover"}} />
        </div>
        <div style={{flex:1}}>
          <div style={{fontSize:18,fontWeight:"bold",color:G.accentLt,letterSpacing:1}}>Jesus First Christian Ministry</div>
          <div style={{fontSize:11,color:G.muted,letterSpacing:2.5,marginTop:2}}>
            PETERBOROUGH · ATTENDANCE SYSTEM
            <span style={{marginLeft:10,color:"#5cb85c",fontSize:10}}>● Firebase Live</span>
          </div>
        </div>
        {/* Export dropdown */}
        <div style={{position:"relative"}} onClick={e=>e.stopPropagation()}>
          <button style={gBtn} onClick={()=>setExpOpen(p=>!p)}>⬇ Export ▾</button>
          {expOpen&&(
            <div style={{position:"absolute",right:0,top:"calc(100% + 6px)",background:"#0c1c0c",
              border:`1px solid ${G.border}`,borderRadius:8,overflow:"hidden",minWidth:190,zIndex:300,
              boxShadow:"0 10px 30px rgba(0,0,0,0.6)"}}>
              <button onClick={()=>{doCSV(records,members);setExpOpen(false);}}
                style={{display:"block",width:"100%",padding:"12px 18px",background:"transparent",
                  border:"none",color:G.text,textAlign:"left",cursor:"pointer",fontSize:13,
                  borderBottom:`1px solid ${G.border}`}}>📄 Export as CSV</button>
              <button onClick={()=>{doXLSX(records,members);setExpOpen(false);}}
                style={{display:"block",width:"100%",padding:"12px 18px",background:"transparent",
                  border:"none",color:G.text,textAlign:"left",cursor:"pointer",fontSize:13}}>📊 Export as Excel (.xlsx)</button>
            </div>
          )}
        </div>
      </div>

      {/* ── NAV ── */}
      <nav style={{display:"flex",gap:4,padding:"10px 20px",background:"rgba(0,0,0,0.22)",
        borderBottom:`1px solid rgba(80,150,80,0.12)`,flexWrap:"wrap"}}>
        {[["take","✝ Attendance"],["history","📋 History"],["members","👥 Members"],["stats","📊 Statistics"]].map(([v,l])=>(
          <button key={v} style={navBtn(view===v)} onClick={()=>setView(v)}>{l}</button>
        ))}
      </nav>

      <div style={{padding:"20px 20px 80px",maxWidth:820,margin:"0 auto"}}>

        {/* ── TAKE ATTENDANCE ── */}
        {view==="take"&&<div className="fade-in">
          <div style={card}>
            <div style={secT}>Service Details</div>
            <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
              <div style={{flex:1,minWidth:150}}>
                <label style={{fontSize:11,color:G.muted,letterSpacing:2,display:"block",marginBottom:4}}>DATE</label>
                <input type="date" value={date} onChange={e=>{setDate(e.target.value);setSaved(false);}} style={{...inp,colorScheme:"dark"}} />
              </div>
              <div style={{flex:2,minWidth:200}}>
                <label style={{fontSize:11,color:G.muted,letterSpacing:2,display:"block",marginBottom:4}}>SERVICE TYPE</label>
                <select value={service} onChange={e=>{setService(e.target.value);setSaved(false);}} style={sel}>
                  {SERVICES.map(s=><option key={s}>{s}</option>)}
                </select>
              </div>
            </div>
          </div>

          <div style={card}>
            <div style={secT}>Members — {pCount} of {members.length} Present</div>
            <input placeholder="🔍 Search members..." value={search} onChange={e=>setSearch(e.target.value)} style={{...inp,marginBottom:12}} />
            {filtered.length===0&&<p style={{color:G.muted,textAlign:"center",padding:20}}>No members found.</p>}
            {filtered.map(m=>(
              <div key={m.id} style={mRow(!!att[m.id])} onClick={()=>toggle(m.id)}>
                <div style={chk(!!att[m.id])}>
                  {att[m.id]&&<span style={{color:"#061006",fontSize:13,fontWeight:"bold"}}>✓</span>}
                </div>
                <span style={{flex:1,fontSize:14,color:G.text}}>{m.name}</span>
                <span style={badge(m.role)}>{m.role}</span>
              </div>
            ))}
          </div>

          <div style={card}>
            <div style={secT}>Visitors — {vCount} recorded</div>
            {visitors.map((v,i)=>(
              <div key={i} style={{display:"flex",gap:8,marginBottom:8}}>
                <input placeholder={`Visitor ${i+1} full name`} value={v.name}
                  onChange={e=>{const u=[...visitors];u[i]={name:e.target.value};setVisitors(u);setSaved(false);}}
                  style={inp} />
                {visitors.length>1&&<button onClick={()=>setVisitors(visitors.filter((_,j)=>j!==i))} style={{...dBtn,padding:"8px 12px"}}>✕</button>}
              </div>
            ))}
            <button style={{...sBtn,marginTop:4}} onClick={()=>setVisitors([...visitors,{name:""}])}>+ Add Visitor</button>
          </div>

          <div style={{display:"flex",gap:12,alignItems:"center",flexWrap:"wrap"}}>
            <button style={{...pBtn,opacity:saving?0.6:1}} onClick={saveAtt} disabled={saving}>
              {saving ? <span>Saving… <span className="spin">⟳</span></span> : "Save Attendance Record"}
            </button>
            {saved&&!saving&&<span style={{color:G.accentLt,fontSize:13,letterSpacing:1}}>✓ Saved to Firebase!</span>}
          </div>

          <div className="pulse" style={{position:"fixed",bottom:24,right:24,background:"linear-gradient(135deg,#3a7a3a,#5cb85c)",
            color:"#061006",borderRadius:"50%",width:62,height:62,display:"flex",flexDirection:"column",
            alignItems:"center",justifyContent:"center",fontWeight:"bold",boxShadow:"0 4px 20px rgba(92,184,92,0.5)",
            fontSize:20,lineHeight:1.1,zIndex:99}}>
            <span>{pCount+vCount}</span>
            <span style={{fontSize:9,letterSpacing:1}}>HERE</span>
          </div>
        </div>}

        {/* ── HISTORY ── */}
        {view==="history"&&<div className="fade-in">
          <div style={card}>
            <div style={secT}>Attendance Records ({records.length} services)</div>
            {records.length===0&&<p style={{color:G.muted,textAlign:"center",padding:40}}>No records yet — start taking attendance.</p>}
            {records.map(r=>{
              const pm=members.filter(m=>(r.presentIds||[]).includes(m.id));
              const ab=members.filter(m=>!(r.presentIds||[]).includes(m.id));
              return(
                <div key={r.firestoreId} style={{...card,marginBottom:10,padding:"14px 18px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:8}}>
                    <div>
                      <div style={{fontSize:15,color:G.accentLt,fontWeight:"bold"}}>{r.service}</div>
                      <div style={{fontSize:12,color:G.muted,marginTop:3}}>{fmtDate(r.date)}</div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <span style={{fontSize:28,fontWeight:"bold",color:G.accent}}>{r.total}</span>
                      <div style={{fontSize:10,color:G.muted,letterSpacing:1}}>TOTAL</div>
                    </div>
                  </div>
                  <div style={{marginTop:10,fontSize:12,color:G.muted}}>
                    <span style={{color:G.accentLt}}>Present ({(r.presentIds||[]).length}):</span>{" "}
                    {pm.map(m=>m.name).join(", ")||"None"}
                  </div>
                  {ab.length>0&&<div style={{marginTop:5,fontSize:12,color:G.muted}}>
                    <span style={{color:"#f08080"}}>Absent ({ab.length}):</span>{" "}
                    {ab.map(m=>m.name).join(", ")}
                  </div>}
                  {(r.visitors||[]).length>0&&<div style={{marginTop:5,fontSize:12,color:G.muted}}>
                    <span style={{color:G.gold}}>Visitors ({r.visitors.length}):</span>{" "}
                    {r.visitors.map(v=>v.name).join(", ")}
                  </div>}
                </div>
              );
            })}
          </div>
        </div>}

        {/* ── MEMBERS ── */}
        {view==="members"&&<div className="fade-in">
          <div style={card}>
            <div style={secT}>Add New Member</div>
            <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"flex-end"}}>
              <div style={{flex:2,minWidth:160}}>
                <label style={{fontSize:11,color:G.muted,letterSpacing:2,display:"block",marginBottom:4}}>FULL NAME</label>
                <input placeholder="Enter full name" value={newM.name}
                  onChange={e=>setNewM({...newM,name:e.target.value})}
                  onKeyDown={e=>e.key==="Enter"&&addMember()} style={inp} />
              </div>
              <div style={{flex:1,minWidth:130}}>
                <label style={{fontSize:11,color:G.muted,letterSpacing:2,display:"block",marginBottom:4}}>ROLE</label>
                <select value={newM.role} onChange={e=>setNewM({...newM,role:e.target.value})} style={sel}>
                  {ROLES.map(r=><option key={r}>{r}</option>)}
                </select>
              </div>
              <button style={{...pBtn,marginBottom:1}} onClick={addMember}>Add Member</button>
            </div>
          </div>
          <div style={card}>
            <div style={secT}>Registered Members ({members.length})</div>
            <input placeholder="🔍 Search..." value={search} onChange={e=>setSearch(e.target.value)} style={{...inp,marginBottom:12}} />
            {members.filter(m=>m.name.toLowerCase().includes(search.toLowerCase())).map(m=>(
              <div key={m.id} style={{...mRow(false),cursor:"default"}}>
                <span style={{flex:1,fontSize:14,color:G.text}}>{m.name}</span>
                <span style={badge(m.role)}>{m.role}</span>
                <button onClick={()=>delMember(m.id)} style={dBtn}>Remove</button>
              </div>
            ))}
          </div>
        </div>}

        {/* ── STATS ── */}
        {view==="stats"&&<div className="fade-in">
          <div style={{display:"flex",gap:12,marginBottom:16,flexWrap:"wrap"}}>
            {[{l:"Total Services",v:totalSvc},{l:"Avg. Attendance",v:avgAtt},{l:"Members",v:members.length}].map(s=>(
              <div key={s.l} style={{flex:1,minWidth:130,background:"rgba(92,184,92,0.07)",
                border:`1px solid rgba(92,184,92,0.25)`,borderRadius:10,padding:"16px 20px",textAlign:"center"}}>
                <div style={{fontSize:34,fontWeight:"bold",color:G.accent}}>{s.v}</div>
                <div style={{fontSize:10,letterSpacing:2,color:G.muted,marginTop:4}}>{s.l.toUpperCase()}</div>
              </div>
            ))}
          </div>

          {best&&<div style={card}>
            <div style={secT}>Best Attended Service</div>
            <div style={{color:G.accentLt,fontSize:18,marginBottom:4}}>{best.service}</div>
            <div style={{color:G.muted,fontSize:13}}>{fmtDate(best.date)} · {best.total} in attendance</div>
          </div>}

          <div style={card}>
            <div style={secT}>Breakdown by Service Type</div>
            {SERVICES.map(s=>{
              const f=records.filter(r=>r.service===s);
              const avg=f.length?Math.round(f.reduce((a,r)=>a+r.total,0)/f.length):0;
              const mx=f.reduce((a,r)=>Math.max(a,r.total),0);
              return(
                <div key={s} style={{marginBottom:14}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                    <span style={{fontSize:13,color:G.text}}>{s}</span>
                    <span style={{fontSize:11,color:G.muted}}>{f.length} services · avg {avg}</span>
                  </div>
                  <div style={{height:7,background:"rgba(255,255,255,0.05)",borderRadius:4,overflow:"hidden"}}>
                    <div style={{height:"100%",width:`${mx?(avg/mx)*100:0}%`,background:"linear-gradient(90deg,#3a7a3a,#5cb85c)",borderRadius:4,transition:"width 0.6s"}} />
                  </div>
                </div>
              );
            })}
            {totalSvc===0&&<p style={{color:G.muted,textAlign:"center",padding:30}}>No data yet.</p>}
          </div>

          {totalSvc>0&&<div style={card}>
            <div style={secT}>Export Records</div>
            <p style={{color:G.muted,fontSize:13,marginBottom:14}}>Download all attendance records for your church files or reporting.</p>
            <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
              <button style={gBtn} onClick={()=>doCSV(records,members)}>📄 Download CSV</button>
              <button style={gBtn} onClick={()=>doXLSX(records,members)}>📊 Download Excel (.xlsx)</button>
            </div>
          </div>}
        </div>}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
