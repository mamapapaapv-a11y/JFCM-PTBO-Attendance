<!DOCTYPE html>
<html>
<head>
  <title>Member List</title>
</head>
<body>

<h2>Add Member</h2>

<input type="text" id="name" placeholder="Enter name">
<button onclick="addMember()">Add</button>

<h3>Members:</h3>
<ul id="list"></ul>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// 🔴 PUT YOUR FIREBASE CONFIG HERE
const firebaseConfig = {
  apiKey: "AIzaSyCGFFgjAVprVRgSnUYkBclL3sMfE7t2vWw",
  authDomain: "jfcm-ptbo-attendance.firebaseapp.com",
  projectId: "jfcm-ptbo-attendance",
  storageBucket: "jfcm-ptbo-attendance.firebasestorage.app",
  messagingSenderId: "688875506086",
  appId: "1:688875506086:web:7b5537614223b39f71a767",
  measurementId: "G-SBJG1TT1RV"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Add member
window.addMember = async function () {
  const name = document.getElementById("name").value;

  if (name === "") return;

  await addDoc(collection(db, "members"), {
    name: name
  });

  document.getElementById("name").value = "";
};

// Real-time display
onSnapshot(collection(db, "members"), (snapshot) => {
  const list = document.getElementById("list");
  list.innerHTML = "";

  snapshot.forEach((doc) => {
    let li = document.createElement("li");
    li.textContent = doc.data().name;
    list.appendChild(li);
  });
});
</script>

</body>
</html>
